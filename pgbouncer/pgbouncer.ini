; P.R.O.F.I.T. PgBouncer 설정
; docker-compose.yml 환경변수로 기본 설정이 주입되며,
; 이 파일은 세부 튜닝이 필요할 때 사용한다.

[databases]
profit_db = host=timescaledb port=5432 dbname=profit_db

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; 커넥션 풀링 모드 (transaction 권장)
pool_mode = transaction
default_pool_size = 20
max_client_conn = 200
reserve_pool_size = 5
reserve_pool_timeout = 3

; 타임아웃
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 30
query_wait_timeout = 120

; 로깅
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; 에이전트별 풀 구분을 위한 설정 (향후 확장)
; application_name 기반 라우팅 고려
