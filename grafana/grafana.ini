; P.R.O.F.I.T. Grafana 설정

[server]
http_port = 3000
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
admin_user = admin
; admin_password는 환경변수 GF_SECURITY_ADMIN_PASSWORD로 주입

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/system.json

[paths]
provisioning = /etc/grafana/provisioning
